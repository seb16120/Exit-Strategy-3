name: Apply review fixes

on:
  push:
    branches:
      - batch/fix-human-layout-review-record

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: batch/fix-human-layout-review-record
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: node scripts/apply-review-fix.js
      - run: node --test
      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: keep reviews tied to the current match"
          git push origin HEAD:batch/fix-human-layout-review-record
