name: Apply gameplay and sequence fixes

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Escape generated template literals
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/apply-best-sequence-freeze-fix.js')
          text = path.read_text()
          text = text.replace('${state.personByOwner.cyan}', r'\${state.personByOwner.cyan}')
          text = text.replace('${placements}', r'\${placements}')
          text = text.replace('${games}', r'\${games}')
          path.write_text(text)
          PY
      - run: node scripts/apply-best-sequence-freeze-fix.js
      - run: node --test
      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add setup replay undo and colored history"
          git push origin HEAD:main
