name: Apply review fixes

on:
  push:
    branches:
      - batch/fix-human-layout-review-record

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: batch/fix-human-layout-review-record
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Patch source and layout
        run: |
          node - <<'NODE'
          const fs = require('node:fs');

          function replaceOrFail(text, pattern, replacement, label) {
            const next = text.replace(pattern, replacement);
            if (next === text) throw new Error(`Could not patch ${label}`);
            return next;
          }

          let review = fs.readFileSync('src/game-review-tools.source.js', 'utf8');
          review = replaceOrFail(
            review,
            /  function beginTracking\(\) \{[\s\S]*?\n  \}\n\n  function rebuildSnapshot/,
            `  function beginTracking() {
    if (analysis.active || !phaseCard?.textContent.includes('CURRENT TURN') || boardFrame?.hidden || sidePanel?.hidden) return;
    const entries = Array.from(historyList?.children || []).map((item) => item.textContent.trim());
    if (entries.length !== 0) return;

    const config = deriveConfig();
    const initial = initialSnapshot();
    const previousInitial = currentRecord?.timeline?.[0];
    const sameInitialPosition = Boolean(previousInitial) &&
      Game.serializePosition(previousInitial.pieces, 'cyan') === Game.serializePosition(initial.pieces, 'cyan');
    const sameConfig = Boolean(currentRecord) && JSON.stringify(currentRecord.config) === JSON.stringify(config);
    const sameOpenRecord = Boolean(currentRecord) &&
      !currentRecord.result &&
      currentRecord.entries.length === 0 &&
      sameInitialPosition &&
      sameConfig;
    if (sameOpenRecord) return;

    currentRecord = {
      format: FORMAT_PGN,
      version: 1,
      createdAt: new Date().toISOString(),
      config,
      timeline: [initial],
      entries: [],
      result: null
    };
    pendingLaunch = null;
  }

  function rebuildSnapshot`,
            'beginTracking'
          );

          review = replaceOrFail(
            review,
            `  function relaunchConfig(config) {\n    stopAutomaticSeries();`,
            `  function relaunchConfig(config) {\n    currentRecord = null;\n    stopAutomaticSeries();`,
            'relaunchConfig reset'
          );

          review = replaceOrFail(
            review,
            `  document.addEventListener('click', (event) => {\n    if (event.target.closest?.('#startCpuDuelButton')) {`,
            `  document.addEventListener('click', (event) => {\n    const launchTarget = event.target.closest?.('#startCpuDuelButton, #localModeButton, #cpu1ModeButton, #cpu3ModeButton, #cpuPlusModeButton');\n    if (launchTarget) currentRecord = null;\n    if (event.target.closest?.('#startCpuDuelButton')) {`,
            'launch reset'
          );
          fs.writeFileSync('src/game-review-tools.source.js', review);

          fs.writeFileSync('src/game-review-tools.js', `(() => {
  'use strict';

  const scriptUrl = new URL(document.currentScript.src);
  const sourceUrl = new URL('game-review-tools.source.js', scriptUrl);

  async function boot() {
    const response = await fetch(sourceUrl, { cache: 'no-store' });
    if (!response.ok) throw new Error(\`Could not load game-review source (\${response.status}).\`);
    const source = await response.text();
    (0, eval)(source);
  }

  boot().catch((error) => {
    console.error('Exit Strategy 3 review tools failed to load.', error);
    const toast = document.querySelector('#toast');
    if (!toast) return;
    toast.textContent = error.message || String(error);
    toast.classList.add('visible');
  });
})();
`);

          let series = fs.readFileSync('src/cpu-series-tools.js', 'utf8');
          series = replaceOrFail(
            series,
            `  function isCpuDuelVisible() {\n    const cpuControls = document.querySelector('#cpuControls');\n    return Boolean(sidePanel && cpuControls && !sidePanel.hidden && !cpuControls.hidden);\n  }`,
            `  function isCpuDuelVisible() {\n    const playVisible = Boolean(sidePanel && !sidePanel.hidden && phaseCard?.textContent.includes('CURRENT TURN'));\n    return playVisible && !document.body.classList.contains('analysis-mode');\n  }`,
            'desktop play layout detection'
          );
          fs.writeFileSync('src/cpu-series-tools.js', series);

          fs.writeFileSync('tests/game-review-tools.test.js', `'use strict';

const test = require('node:test');
const assert = require('node:assert/strict');
const fs = require('node:fs');
const path = require('node:path');
const vm = require('node:vm');

const sourcePath = path.join(__dirname, '..', 'src', 'game-review-tools.source.js');
const loaderPath = path.join(__dirname, '..', 'src', 'game-review-tools.js');
const seriesPath = path.join(__dirname, '..', 'src', 'cpu-series-tools.js');

function read(file) { return fs.readFileSync(file, 'utf8'); }

test('game review source and loader are valid JavaScript', () => {
  const source = read(sourcePath);
  assert.doesNotThrow(() => new vm.Script(source));
  assert.doesNotThrow(() => new vm.Script(read(loaderPath)));
  assert.match(source, /ES3-PGN\\/1/);
  assert.match(source, /ES3-FEN\\/1/);
});

test('a newly launched match replaces the previous review record', () => {
  const source = read(sourcePath);
  assert.match(source, /sameOpenRecord/);
  assert.match(source, /if \\(launchTarget\\) currentRecord = null/);
  assert.match(source, /function relaunchConfig\\(config\\) \\{\\s*currentRecord = null/);
});

test('wide desktop layout applies to every active match, except analysis', () => {
  const source = read(seriesPath);
  assert.match(source, /phaseCard\\?\\.textContent\\.includes\\('CURRENT TURN'\\)/);
  assert.match(source, /classList\\.contains\\('analysis-mode'\\)/);
});

test('game review includes the requested flows', () => {
  const source = read(sourcePath);
  assert.match(source, /Analyze game/);
  assert.match(source, /Return to menu/);
  assert.match(source, /Next CPU move/);
  assert.match(source, /Paste ES3-PGN \\/ ES3-FEN/);
  assert.match(source, /You win/);
});
`);

          fs.rmSync('.github/workflows/decode-review-source.yml');
          NODE
      - name: Run tests
        run: node --test
      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: keep reviews tied to the current match"
          git push origin HEAD:batch/fix-human-layout-review-record
