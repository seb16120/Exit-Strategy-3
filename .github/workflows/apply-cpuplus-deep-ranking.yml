name: Apply CPU+ deep search and placement ranking

on:
  push:
    branches:
      - batch/cpuplus-deep-ranking

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: batch/cpuplus-deep-ranking
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Apply patch
        shell: bash
        run: |
          echo '' | base64 -d | gzip -d > /tmp/apply-cpuplus-deep-ranking.js
          node /tmp/apply-cpuplus-deep-ranking.js
      - name: Test
        run: node --test
      - name: Commit implementation
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-cpuplus-deep-ranking.yml
          git add -A
          git commit -m "feat: deepen CPU+ search and rank all placements"
          git push origin HEAD:batch/cpuplus-deep-ranking
