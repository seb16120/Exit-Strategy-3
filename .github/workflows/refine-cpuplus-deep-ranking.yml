name: Refine CPU+ deep search and ranking

on:
  push:
    branches:
      - batch/cpuplus-deep-ranking

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: batch/cpuplus-deep-ranking
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Apply refinement
        shell: bash
        run: |
          echo '' | base64 -d | gzip -d > /tmp/refine-cpuplus-deep-ranking.js
          node /tmp/refine-cpuplus-deep-ranking.js
      - name: Test
        run: node --test
      - name: Commit refinement
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/refine-cpuplus-deep-ranking.yml
          git add -A
          git commit -m "fix: preserve CPU+ best move at hard stop"
          git push origin HEAD:batch/cpuplus-deep-ranking
