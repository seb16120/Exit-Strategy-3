name: Apply analysis progress update

on:
  push:
    branches:
      - batch/analysis-progress-pre-game-nav

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: batch/analysis-progress-pre-game-nav
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Apply changes
        run: node scripts/apply-analysis-progress-nav.js
      - name: Run tests
        run: node --test
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: show CPU+ analysis progress and pre-game navigation"
          git push origin HEAD:batch/analysis-progress-pre-game-nav
