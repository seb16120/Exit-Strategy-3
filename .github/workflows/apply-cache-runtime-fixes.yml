name: Apply cache and runtime fixes

on:
  push:
    branches:
      - batch/cache-favicon-runtime-fixes

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: batch/cache-favicon-runtime-fixes
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: node scripts/apply-cache-runtime-fixes.js
      - run: node --test
      - name: Commit verified fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: force fresh assets and stabilize CPU+ sequence UI"
          git push origin HEAD:batch/cache-favicon-runtime-fixes
